<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Carousel Full Image - Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        
        .carousel-container {
            width: 100%;
            max-width: 1400px;
            padding: 40px 20px;
            position: relative;
        }
        
        .card-carousel-wrapper {
            position: relative;
            overflow: hidden;
            padding: 40px 0;
            min-height: 500px;
        }
        
        .card-carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            align-items: center;
        }
        
        .card-item {
            flex: 0 0 400px;
            height: 500px;
            margin: 0 20px;
            border-radius: 25px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            position: relative;
        }
        
        .card-item.active {
            transform: scale(1.05);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
        
        .card-item.side {
            transform: scale(0.85);
            opacity: 0.8;
            filter: brightness(0.7) blur(1px);
        }
        
        .card-item.hidden {
            transform: scale(0.7);
            opacity: 0.4;
            filter: brightness(0.5) blur(3px);
        }
        
        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
        }
        
        .card-item:hover .card-image {
            transform: scale(1.05);
        }
        
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.5);
        }
        
        .nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .prev-btn {
            left: 20px;
        }
        
        .next-btn {
            right: 20px;
        }
        
        .indicators {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
        }
        
        .indicator {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .indicator.active {
            background: white;
            width: 60px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        .indicator:hover {
            background: rgba(255, 255, 255, 0.6);
        }
        
        .progress-bar-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 5;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.1s linear;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        .card-item.loading {
            background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        .image-counter {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
            z-index: 5;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* Responsive Design */
        @media (max-width: 1024px) {
            .card-item {
                flex: 0 0 350px;
                height: 450px;
                margin: 0 15px;
            }
        }
        
        @media (max-width: 768px) {
            .card-item {
                flex: 0 0 300px;
                height: 400px;
                margin: 0 10px;
            }
            
            .card-item.active {
                transform: scale(1.03);
            }
            
            .card-item.side {
                transform: scale(0.8);
            }
            
            .card-item.hidden {
                transform: scale(0.65);
            }
            
            .nav-btn {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
            }
            
            .prev-btn {
                left: 10px;
            }
            
            .next-btn {
                right: 10px;
            }
        }
        
        @media (max-width: 480px) {
            .card-item {
                flex: 0 0 260px;
                height: 350px;
                margin: 0 8px;
            }
            
            .card-item.active {
                transform: scale(1.02);
            }
        }
    </style>
</head>
<body>
    <div class="carousel-container">
        <div class="position-relative">
            <!-- Tombol Navigasi -->
            <button class="nav-btn prev-btn" id="prevBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <button class="nav-btn next-btn" id="nextBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
            
            <!-- Container Card Carousel -->
            <div class="card-carousel-wrapper" id="carouselWrapper">
                <div class="card-carousel-track" id="cardTrack">
                    <!-- Card akan dirender oleh JavaScript -->
                </div>
            </div>
        </div>
        
        <!-- Indikator -->
        <div class="indicators" id="indicators">
            <!-- Indikator akan dirender oleh JavaScript -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Data card dengan full image saja
        const cards = [
            {
                id: 1,
                image: "https://images.unsplash.com/photo-1588668214407-6ea9a6d8c272?w=800&h=1000&fit=crop",
                alt: "Gunung Bromo"
            },
            {
                id: 2,
                image: "https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=800&h=1000&fit=crop",
                alt: "Pantai Bali"
            },
            {
                id: 3,
                image: "https://images.unsplash.com/photo-1582719355819-9c2b3b90a9cc?w=800&h=1000&fit=crop",
                alt: "Candi Borobudur"
            },
            {
                id: 4,
                image: "https://images.unsplash.com/photo-1583212292454-1fe6229603b7?w=800&h=1000&fit=crop",
                alt: "Raja Ampat"
            },
            {
                id: 5,
                image: "https://images.unsplash.com/photo-1570733587052-8f72bd88cac4?w=800&h=1000&fit=crop",
                alt: "Nusa Penida"
            },
            {
                id: 6,
                image: "https://images.unsplash.com/photo-1598977122420-fd6bb0a39b48?w=800&h=1000&fit=crop",
                alt: "Danau Toba"
            },
            {
                id: 7,
                image: "https://images.unsplash.com/photo-1518548419970-58e3b4079ab2?w=800&h=1000&fit=crop",
                alt: "Kawah Ijen"
            }
        ];

        let currentIndex = 0;
        let isAnimating = false;
        let autoPlayInterval;
        
        const cardTrack = document.getElementById('cardTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const indicatorsContainer = document.getElementById('indicators');
        const carouselWrapper = document.getElementById('carouselWrapper');

        function createCardElement(card, index) {
            const cardElement = document.createElement('div');
            cardElement.className = 'card-item loading';
            cardElement.setAttribute('data-index', index);
            
            cardElement.innerHTML = `
                <img src="${card.image}" class="card-image" alt="${card.alt}" 
                     onload="this.parentElement.classList.remove('loading')"
                     onerror="this.src='https://via.placeholder.com/800x1000/333/fff?text=Image+${index + 1}'">
                <div class="progress-bar-container">
                    <div class="progress-bar"></div>
                </div>
            `;
            
            cardElement.addEventListener('click', () => {
                if (index !== currentIndex && !isAnimating) {
                    goToSlide(index);
                }
            });
            
            return cardElement;
        }

        function renderCards() {
            cardTrack.innerHTML = '';
            cards.forEach((card, index) => {
                const cardElement = createCardElement(card, index);
                cardTrack.appendChild(cardElement);
            });
            
            updateCardStates();
        }

        function updateCardStates() {
            const cardElements = cardTrack.querySelectorAll('.card-item');
            
            cardElements.forEach((card, index) => {
                // Remove all state classes
                card.classList.remove('active', 'side', 'hidden');
                
                const distance = Math.abs(index - currentIndex);
                
                if (index === currentIndex) {
                    card.classList.add('active');
                    card.style.pointerEvents = 'auto';
                } else if (distance === 1) {
                    card.classList.add('side');
                    card.style.pointerEvents = 'auto';
                } else {
                    card.classList.add('hidden');
                    card.style.pointerEvents = 'none';
                }
            });
            
            updateSlidePosition();
            updateIndicators();
            updateProgressBar();
        }

        function updateSlidePosition() {
            const cardWidth = window.innerWidth <= 480 ? 260 : 
                             window.innerWidth <= 768 ? 300 : 
                             window.innerWidth <= 1024 ? 350 : 400;
            const margin = window.innerWidth <= 480 ? 8 : 
                          window.innerWidth <= 768 ? 10 : 
                          window.innerWidth <= 1024 ? 15 : 20;
            const totalCardWidth = cardWidth + (margin * 2);
            
            // Hitung offset untuk menampilkan card aktif di tengah
            const wrapperWidth = carouselWrapper.clientWidth;
            const offset = (wrapperWidth / 2) - (cardWidth / 2) - margin;
            
            cardTrack.style.transform = `translateX(${offset - (currentIndex * totalCardWidth)}px)`;
        }

        function updateIndicators() {
            indicatorsContainer.innerHTML = '';
            
            cards.forEach((_, index) => {
                const indicator = document.createElement('div');
                indicator.className = 'indicator';
                if (index === currentIndex) {
                    indicator.classList.add('active');
                }
                
                indicator.addEventListener('click', () => {
                    if (!isAnimating) {
                        goToSlide(index);
                    }
                });
                
                indicatorsContainer.appendChild(indicator);
            });
        }

        function updateProgressBar() {
            // Reset semua progress bar
            const progressBars = document.querySelectorAll('.progress-bar');
            progressBars.forEach(bar => {
                bar.style.width = '0%';
                bar.style.transition = 'none';
            });
            
            // Animasi progress bar untuk card aktif
            const activeCard = document.querySelector('.card-item.active');
            if (activeCard) {
                const progressBar = activeCard.querySelector('.progress-bar');
                if (progressBar) {
                    // Reset dulu
                    progressBar.style.transition = 'none';
                    progressBar.style.width = '0%';
                    
                    // Trigger reflow
                    progressBar.offsetHeight;
                    
                    // Mulai animasi
                    progressBar.style.transition = 'width 5s linear';
                    progressBar.style.width = '100%';
                }
            }
        }

        function goToSlide(index) {
            if (isAnimating || index === currentIndex) return;
            
            isAnimating = true;
            currentIndex = index;
            
            // Animasi update
            updateCardStates();
            
            setTimeout(() => {
                isAnimating = false;
                resetAutoPlay();
            }, 500);
        }

        function nextSlide() {
            if (!isAnimating) {
                const nextIndex = (currentIndex + 1) % cards.length;
                goToSlide(nextIndex);
            }
        }

        function prevSlide() {
            if (!isAnimating) {
                const prevIndex = (currentIndex - 1 + cards.length) % cards.length;
                goToSlide(prevIndex);
            }
        }

        function startAutoPlay() {
            stopAutoPlay();
            updateProgressBar();
            
            autoPlayInterval = setInterval(() => {
                nextSlide();
            }, 5000);
        }

        function stopAutoPlay() {
            clearInterval(autoPlayInterval);
        }

        function resetAutoPlay() {
            stopAutoPlay();
            startAutoPlay();
        }

        // Event Listeners
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);

        // Hover untuk pause auto-play
        carouselWrapper.addEventListener('mouseenter', () => {
            stopAutoPlay();
            const activeCard = document.querySelector('.card-item.active');
            if (activeCard) {
                const progressBar = activeCard.querySelector('.progress-bar');
                if (progressBar) {
                    progressBar.style.transition = 'none';
                }
            }
        });

        carouselWrapper.addEventListener('mouseleave', () => {
            startAutoPlay();
        });

        // Touch events untuk mobile
        let touchStartX = 0;
        let touchEndX = 0;

        carouselWrapper.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            stopAutoPlay();
        }, { passive: true });

        carouselWrapper.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
            startAutoPlay();
        }, { passive: true });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextSlide();
            }
        });

        // Resize handler
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                updateSlidePosition();
            }, 250);
        });

        // Initial render
        renderCards();
        startAutoPlay();
        
        // Update posisi setelah semua gambar dimuat
        window.addEventListener('load', () => {
            setTimeout(updateSlidePosition, 200);
        });
    </script>
</body>
</html>
