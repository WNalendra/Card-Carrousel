<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Carousel · Minimal</title>
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    /* gaya sangat ringkas, tanpa efek berlebihan */
    .card-row { display: flex; gap: 1rem; justify-content: center; padding: 1rem 0; }
    .card-wrapper { flex: 0 0 28%; max-width: 28%; transition: 0.2s; }
    .card-wrapper .card { transition: 0.2s; }
    .card-wrapper.active .card { transform: scale(1.05); border-color: #0d6efd; }
    .card-wrapper:not(.active) .card { opacity: 0.6; transform: scale(0.92); }
    .carousel-control-prev, .carousel-control-next {
      width: 2.5rem; height: 2.5rem; top: 50%; transform: translateY(-50%);
      background: #fff; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .carousel-control-prev { left: -1.2rem; }
    .carousel-control-next { right: -1.2rem; }
    .carousel-control-prev-icon, .carousel-control-next-icon {
      background-color: #0d6efd; border-radius: 50%; padding: 0.4rem;
    }
    @media (max-width: 768px) {
      .card-wrapper { flex: 0 0 80%; max-width: 80%; }
      .carousel-control-prev { left: -0.6rem; }
      .carousel-control-next { right: -0.6rem; }
    }
  </style>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

<div class="container">
  <div id="cardCarousel" class="carousel slide" data-bs-ride="false">
    <div class="carousel-inner">

      <!-- Slide 1 -->
      <div class="carousel-item active">
        <div class="card-row">
          <div class="card-wrapper"><div class="card p-4 text-center">Kartu 1</div></div>
          <div class="card-wrapper active"><div class="card p-4 text-center border-primary">Kartu 2 · Tengah</div></div>
          <div class="card-wrapper"><div class="card p-4 text-center">Kartu 3</div></div>
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="carousel-item">
        <div class="card-row">
          <div class="card-wrapper"><div class="card p-4 text-center">Kartu 4</div></div>
          <div class="card-wrapper active"><div class="card p-4 text-center border-success">Kartu 5 · Tengah</div></div>
          <div class="card-wrapper"><div class="card p-4 text-center">Kartu 6</div></div>
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="carousel-item">
        <div class="card-row">
          <div class="card-wrapper"><div class="card p-4 text-center">Kartu 7</div></div>
          <div class="card-wrapper active"><div class="card p-4 text-center border-warning">Kartu 8 · Tengah</div></div>
          <div class="card-wrapper"><div class="card p-4 text-center">Kartu 9</div></div>
        </div>
      </div>

    </div>

    <!-- Tombol navigasi -->
    <button class="carousel-control-prev" type="button" data-bs-target="#cardCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#cardCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Fungsi aktifkan kartu tengah (index 1) pada slide tertentu
  function setActiveCard(slide) {
    if (!slide) return;
    slide.querySelectorAll('.card-wrapper').forEach(w => w.classList.remove('active'));
    const wrappers = slide.querySelectorAll('.card-wrapper');
    if (wrappers.length >= 2) wrappers[1].classList.add('active');
  }

  // Inisialisasi slide aktif pertama
  document.querySelectorAll('.carousel-item').forEach(item => {
    if (item.classList.contains('active')) setActiveCard(item);
  });

  // Saat slide berubah, set kartu tengah di slide baru
  document.addEventListener('slide.bs.carousel', function(e) {
    document.querySelectorAll('.card-wrapper').forEach(w => w.classList.remove('active'));
    if (e.relatedTarget) setActiveCard(e.relatedTarget);
  });
</script>
</body>
</html>
